name: smart_bin_eng
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  mobile_scanner: ^5.1.1
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  http_parser: ^4.0.2
  dio: ^5.4.0
  geolocator: ^11.0.1
  geocoding: ^3.0.0
  lottie: ^3.3.3
  shimmer: ^3.0.0
  provider: ^6.1.2
  easy_localization: ^3.0.3
  flutter_blue_plus: ^2.3.9
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  web_socket_channel: 3.0.3
  crypto: ^3.0.3
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
    - lib/assets/animations/
    - lib/assets/translations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/app_logo.png"